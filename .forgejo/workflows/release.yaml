# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---
name: Release

on:
  push:
    branches:
      - main
    paths:
      - apps/**
  workflow_dispatch:
    inputs:
      app:
        type: string
        description: App Name
        required: true

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      changed-files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Get changed files (push)
        uses: https://github.com/bjw-s-labs/action-changed-files@a9a36fb08ce06db9b02fbd8026cc2c0945eb9841 # v0.6.0
        id: changed-files-action
        if: ${{ github.event_name == 'push' }}
        with:
          path: apps
          include_only_directories: true
          max_depth: 1

      - name: Set changed files output
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'changed_files=["${{ inputs.app }}"]' >> $GITHUB_OUTPUT
          else
            echo 'changed_files=${{ steps.changed-files-action.outputs.changed_files }}' >> $GITHUB_OUTPUT
          fi

  build:
    if: ${{ needs.prepare.outputs.changed-files != '[]' }}
    name: Build ${{ matrix.app }}
    needs:
      - prepare
    runs-on: dind
    strategy:
      matrix:
        app: ${{ fromJSON(needs.prepare.outputs.changed-files) }}
      fail-fast: false
      max-parallel: 2
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Login to Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: forgejo.hayden.moe
          username: ${{ vars.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Set up rsync
        shell: bash
        run: |-
          sudo apt-get -qq update
          sudo apt-get -qq install rsync
          rsync --version

      - name: Add include directory to build context
        run: |-
          rsync -a --ignore-existing --progress ./include/ ./apps/${{ inputs.app }}/

      - name: Build and push image
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        id: bake
        with:
          push: true
          files: ./docker-bake.hcl
          source: ./apps/${{ matrix.app }}
          targets: image-all
        env:
          GIT_SHA: ${{ github.sha }}

  status:
    if: ${{ !cancelled() }}
    name: Build Success
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Any jobs failed?
        if: ${{ contains(needs.*.result, 'failure') }}
        run: |-
          exit 1

      - name: All jobs passed or skipped?
        if: ${{ !(contains(needs.*.result, 'failure')) }}
        run: |-
          echo "All jobs passed or skipped" && echo "${{ toJSON(needs.*.result) }}"
